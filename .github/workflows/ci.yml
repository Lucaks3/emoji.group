name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Rebuild everything that does not need the network, from committed
      # inputs. The colour step is skipped here because it downloads Twemoji
      # SVGs; its output (data/tags/color.json) is committed and versioned.
      - run: npm run ingest
      - run: npm run expand
      - run: npm run tag:programmatic
      - run: npm run seed:llm
      - run: npm run build
      - run: npm run check
      - run: npm run site

      # Determinism gate: a rebuild from the same inputs must be byte for byte
      # identical to what is committed.
      - name: determinism
        run: git diff --exit-code -- data/records.json data/tags data/llm data/reviews.json dist
